            return;
          }
        } catch (_) {}
        run();
      }

      // ── Menu Admin ──
      let menuAdminItems  = [];
      let menuAdminCat    = "";
      let menuInFirestore = false;
      let menuSortMode    = false;
      let categoryOrder   = [];

      document.querySelector('[data-tab="menu"]').addEventListener("click", loadMenuAdmin);

      async function loadMenuAdmin() {
        const statusEl = document.getElementById("menuAdminStatus");
        statusEl.textContent = "載入中…";
        try {
          const [menuSnap, storeSnap] = await Promise.all([
            menuCollection().orderBy("sortOrder").get(),
            storeDoc().get(),
          ]);
          categoryOrder = storeSnap.data()?.categoryOrder || [];
          if (menuSnap.empty) {
            menuAdminItems  = DEFAULT_MENU.slice();
            menuInFirestore = false;
            statusEl.textContent = "（顯示預設菜單，尚未寫入資料庫）";
          } else {
            menuAdminItems  = menuSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            menuInFirestore = true;
            statusEl.textContent = `共 ${menuAdminItems.length} 項`;
          }
        } catch (e) {
          menuAdminItems = DEFAULT_MENU.slice();
          statusEl.textContent = "載入失敗，顯示預設菜單";
        }
        if (!menuAdminCat && menuAdminItems.length > 0) {
          menuAdminCat = adminApplyCategoryOrder(
            [...new Set(menuAdminItems.map(i => i.category))]
          )[0];
        }
        renderMenuAdmin();
      }

      function adminApplyCategoryOrder(cats) {
        const ordered = categoryOrder.filter(c => cats.includes(c));
        const rest    = cats.filter(c => !categoryOrder.includes(c));
        return [...ordered, ...rest];
      }

      function renderMenuAdmin() {
        const allCats = [...new Set(menuAdminItems.map(i => i.category))];
        const cats    = adminApplyCategoryOrder(allCats);
        document.getElementById("menuCatTabs").innerHTML = cats.map(cat => `
          <button class="menu-cat-btn${cat === menuAdminCat ? " active" : ""}"
            onclick="setMenuAdminCat(this.dataset.cat)" data-cat="${cat.replace(/"/g,"&quot;")}">${cat}</button>
        `).join("");

        const items  = menuAdminItems.filter(i => i.category === menuAdminCat);
        const listEl = document.getElementById("menuAdminList");
        if (items.length === 0) {
          listEl.innerHTML = '<div class="empty-state">此分類無品項</div>';
          return;
        }
        listEl.innerHTML = items.map((item, idx) => {
          const avail = item.available !== false;
          const actions = menuSortMode
            ? `<div class="menu-item-actions">
                 <button class="sort-move-btn" onclick="moveItem('${item.id}',-1)" ${idx === 0 ? "disabled" : ""}>↑</button>
                 <button class="sort-move-btn" onclick="moveItem('${item.id}',1)" ${idx === items.length - 1 ? "disabled" : ""}>↓</button>
               </div>`
            : `<div class="menu-item-actions">
                 <button class="btn-avail ${avail ? "on" : "off"}" onclick="toggleMenuAvail('${item.id}',${!avail})">${avail ? "供應中" : "已下架"}</button>
                 <button class="btn-edit-mi" onclick="openMenuModal('${item.id}')">編輯</button>
                 <button class="btn-del-mi" onclick="deleteMenuAdmin('${item.id}')">刪除</button>
               </div>`;
          return `
            <div class="menu-item-row${avail ? "" : " unavail"}">
              <span class="menu-item-dot" style="background:${item.color || "#aaa"}"></span>
              <span class="menu-item-name">${item.name}</span>
              <span class="menu-item-price">${adminPriceLabel(item)}</span>
              ${actions}
            </div>`;
        }).join("");
      }

      // ── Sort mode ──
      function toggleSortMode() {
        menuSortMode = !menuSortMode;
        const btn = document.getElementById("menuSortToggle");
        const fab = document.getElementById("menuAddFab");
        btn.textContent = menuSortMode ? "完成排序" : "排序";
        btn.classList.toggle("active", menuSortMode);
        fab.style.display = menuSortMode ? "none" : "";

        if (menuSortMode) {
          renderSortCatPanel();
        } else {
          saveSortOrders();
          document.getElementById("menuSortPanel").classList.add("hidden");
        }
        renderMenuAdmin();
      }

      function renderSortCatPanel() {
        const allCats = [...new Set(menuAdminItems.map(i => i.category))];
        categoryOrder = adminApplyCategoryOrder(allCats); // sync missing cats to end
        const list = document.getElementById("sortCatList");
        list.innerHTML = categoryOrder.map((cat, idx) => `
          <div class="sort-cat-row">
            <span class="sort-cat-name">${cat}</span>
            <button class="sort-move-btn" onclick="moveCat(${idx},-1)" ${idx === 0 ? "disabled" : ""}>↑</button>
            <button class="sort-move-btn" onclick="moveCat(${idx},1)" ${idx === categoryOrder.length - 1 ? "disabled" : ""}>↓</button>
          </div>`).join("");
        document.getElementById("menuSortPanel").classList.remove("hidden");
      }

      function moveCat(idx, dir) {
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= categoryOrder.length) return;
        [categoryOrder[idx], categoryOrder[newIdx]] = [categoryOrder[newIdx], categoryOrder[idx]];
        renderSortCatPanel();
        renderMenuAdmin();
      }

      function moveItem(id, dir) {
        const catItems = menuAdminItems
          .map((item, idx) => ({ item, idx }))
          .filter(({ item }) => item.category === menuAdminCat);
        const pos = catItems.findIndex(({ item }) => item.id === id);
        const newPos = pos + dir;
        if (newPos < 0 || newPos >= catItems.length) return;
        const idxA = catItems[pos].idx;
        const idxB = catItems[newPos].idx;
        [menuAdminItems[idxA], menuAdminItems[idxB]] = [menuAdminItems[idxB], menuAdminItems[idxA]];
        renderMenuAdmin();
      }

      async function saveSortOrders() {
        if (!menuInFirestore) return; // 預設菜單尚未寫入，不儲存
        const statusEl = document.getElementById("menuAdminStatus");
        statusEl.textContent = "儲存排序中…";
        const STEP = 10;
        try {
          const batch = db.batch();
          // 依 categoryOrder 順序，每類的品項按目前陣列順序賦值
          const catGroups = {};
          menuAdminItems.forEach(item => {
            (catGroups[item.category] = catGroups[item.category] || []).push(item);
          });
          Object.values(catGroups).forEach(items => {
            items.forEach((item, idx) => {
              if (item.id) batch.update(menuCollection().doc(item.id), { sortOrder: idx * STEP });
            });
          });
          // 分類順序寫入 stores/{storeId}
          batch.update(storeDoc(), { categoryOrder });
          await batch.commit();
          statusEl.textContent = "排序已儲存 ✓";
        } catch (err) {
          statusEl.textContent = "排序儲存失敗：" + err.message;
          await loadMenuAdmin(); // 失敗時還原
        }
      }

      function adminPriceLabel(item) {
        if (item.steps && item.steps.length > 0) {
          const prices = item.steps.flatMap(s => (s.options || []).map(o => o.price)).filter(p => p != null);
          if (!prices.length) return "";
          const min = Math.min(...prices), max = Math.max(...prices);
          return min === max ? `$${min}` : `$${min}~${max}`;
        }
        if (item.variants && item.variants.length > 0) {
          const prices = item.variants.map(v => v.price);
          const min = Math.min(...prices), max = Math.max(...prices);
          return min === max ? `$${min}` : `$${min}~${max}`;
        }
        return item.price != null ? `$${item.price}` : "";
      }

      function setMenuAdminCat(cat) {
        menuAdminCat = cat;
        renderMenuAdmin();
      }

      async function toggleMenuAvail(id, makeAvailable) {
        const idx = menuAdminItems.findIndex(i => i.id === id);
        if (idx === -1) return;
        menuAdminItems[idx].available = makeAvailable;
        renderMenuAdmin();
        try {
          if (!menuInFirestore) {
            // 菜單尚未匯入 Firestore，靜默批次寫入全部品項（含已修改的 available）
            const batch = db.batch();
            menuAdminItems.forEach((item, i) => {
              const { id: itemId, ...data } = item;
              batch.set(menuCollection().doc(itemId), { ...data, sortOrder: data.sortOrder ?? i });
            });
            await batch.commit();
            menuInFirestore = true;
            document.getElementById("menuAdminStatus").textContent = `共 ${menuAdminItems.length} 項`;
          } else {
            await menuCollection().doc(id).update({ available: makeAvailable });
          }
        } catch (e) {
          menuAdminItems[idx].available = !makeAvailable;
          renderMenuAdmin();
          alert("操作失敗：" + e.message);
        }
      }

      async function deleteMenuAdmin(id) {
        const item = menuAdminItems.find(i => i.id === id);
        if (!item) return;
        if (!confirm(`確定要刪除「${item.name}」？此操作無法復原。`)) return;
        menuAdminItems = menuAdminItems.filter(i => i.id !== id);
        renderMenuAdmin();
        try {
          if (!menuInFirestore) {
            // 先批次寫入（不含已刪除品項），再標記已在 Firestore
            const batch = db.batch();
            menuAdminItems.forEach((it, i) => {
              const { id: itemId, ...data } = it;
              batch.set(menuCollection().doc(itemId), { ...data, sortOrder: data.sortOrder ?? i });
            });
            await batch.commit();
            menuInFirestore = true;
          } else {
            await menuCollection().doc(id).delete();
          }
          document.getElementById("menuAdminStatus").textContent = `已刪除「${item.name}」`;
        } catch (e) {
          alert("刪除失敗：" + e.message);
          loadMenuAdmin();
        }
      }

      async function seedMenuAdmin() {
        if (!confirm("此操作將把所有預設菜單品項寫入資料庫（同 ID 品項會覆蓋），確定繼續？")) return;
        const statusEl = document.getElementById("menuAdminStatus");
        statusEl.textContent = "匯入中…";
        try {
          const batch = db.batch();
          DEFAULT_MENU.forEach((item, idx) => {
            const ref = menuCollection().doc(item.id);
            batch.set(ref, { ...item, sortOrder: idx });
          });
          await batch.commit();
          statusEl.textContent = "匯入完成！";
          menuAdminCat = "";
          loadMenuAdmin();
        } catch (e) {
          statusEl.textContent = "匯入失敗：" + e.message;
        }
      }

      function openMenuModal(id) {
        const existing = id ? menuAdminItems.find(i => i.id === id) : null;
        const item = existing ? { ...existing } : {
          id: "", name: "", category: menuAdminCat, color: "#888888", price: 0, available: true
        };
        const cats = [...new Set(menuAdminItems.map(i => i.category))];

        let pType = "simple";
        if (item.steps && item.steps.length > 0) pType = "steps";
        else if (item.variants && item.variants.length > 0) pType = "variants";

        const overlay = document.createElement("div");
        overlay.className = "mm-overlay";
        overlay.id = "mmOverlay";
        overlay.innerHTML = buildModalHTML(item, pType, cats, id);
        document.body.appendChild(overlay);

        const catSel      = overlay.querySelector("#mmCat");
        const newCatInput = overlay.querySelector("#mmNewCat");
        catSel.addEventListener("change", () => {
          newCatInput.classList.toggle("hidden", catSel.value !== "__new__");
        });

        overlay.querySelectorAll(".mm-ptype").forEach(radio => {
          radio.addEventListener("change", () => {
            const newType = overlay.querySelector(".mm-ptype:checked").value;
            overlay.querySelector("#mmPriceBody").innerHTML = buildPriceHTML(item, newType);
          });
        });
      }

        const catOptions = cats.map(c =>
          `<option value="${c.replace(/"/g,"&quot;")}"${c === item.category ? " selected" : ""}>${c}</option>`
        ).join("");

        return `
          <div class="mm-card">
            <h3>${id ? "編輯品項" : "新增品項"}</h3>
            <div class="mm-row">
              <label>名稱</label>
              <input type="text" id="mmName" value="${(item.name||"").replace(/"/g,"&quot;")}" placeholder="品項名稱" />
            </div>
            <div class="mm-row" style="flex-wrap:wrap;gap:6px;">
              <label>分類</label>
              <select id="mmCat">${catOptions}<option value="__new__">＋ 新分類</option></select>
              <input type="text" id="mmNewCat" placeholder="新分類名稱" class="hidden"
                style="flex:1;min-width:120px;padding:6px 9px;border:1.5px solid #ddd;border-radius:6px;font-size:0.84rem;font-family:inherit;outline:none;" />
            </div>
            <div class="mm-row">
              <label>顏色</label>
              <input type="color" id="mmColor" value="${item.color || "#888888"}" />
              <span style="font-size:0.76rem;color:#aaa;margin-left:4px;">分類標示色</span>
            </div>
            <div class="mm-row">
              <label>照片</label>
              <input type="text" id="mmPhoto" value="${(item.photo||"").replace(/"/g,"&quot;")}" placeholder="圖片網址（選填）" />
            </div>
            <div class="mm-divider">價格設定</div>
            <div class="mm-price-type">
              <label><input type="radio" class="mm-ptype" name="mm-ptype" value="simple"${pType==="simple"?" checked":""}> 單一定價</label>
              <label><input type="radio" class="mm-ptype" name="mm-ptype" value="variants"${pType==="variants"?" checked":""}> 規格選項</label>
              <label><input type="radio" class="mm-ptype" name="mm-ptype" value="steps"${pType==="steps"?" checked":""}> 多步驟</label>
            </div>
            <div id="mmPriceBody" style="margin-top:10px;">${buildPriceHTML(item, pType)}</div>
            <div class="mm-footer">
              <button class="mm-cancel" onclick="closeMenuModal()">取消</button>
              <button class="mm-save" onclick="saveMenuModal('${(id||"").replace(/'/g,"\\'")}')">儲存</button>
            </div>
          </div>`;
      }

      function buildPriceHTML(item, pType) {
        if (pType === "variants") {
          const rows = (item.variants || []).map(v => variantRowHTML(v.label, v.price)).join("");
          return `
            <div id="mmVariants">${rows || variantRowHTML("", "")}</div>
            <button class="mm-add-row-btn" type="button" onclick="addVariantRow()">＋ 新增規格</button>`;
        }
        if (pType === "steps") {
          const stepList = item.steps && item.steps.length
            ? item.steps
            : [{ label: "", options: [{ label: "", price: null }] }];
          return stepList.map((step, si) => `
            <div class="mm-step" id="mmStep${si}">
              <div class="mm-step-label">
                步驟 ${si + 1}
                <input type="text" id="mmStepLabel${si}" placeholder="步驟名稱（如：尺寸）"
                  value="${(step.label||"").replace(/"/g,"&quot;")}" />
              </div>
              <div id="mmStepOpts${si}">${(step.options||[]).map(opt => stepOptHTML(opt, si)).join("")}</div>
              <button class="mm-add-row-btn" type="button" onclick="addStepOpt(${si})">＋ 新增選項</button>
            </div>`).join("");
        }
        return `
          <div class="mm-row">
            <label>價格</label>
            <input type="number" id="mmSimplePrice" value="${item.price || 0}" min="0" />
            <span style="font-size:0.82rem;color:#888;">元</span>
          </div>`;
      }

      function variantRowHTML(label, price) {
        return `
          <div class="mm-variant-row">
            <input type="text" class="v-label" placeholder="規格名稱（如：吐司）"

      async function saveMenuModal(id) {
        const name = (document.getElementById("mmName")?.value || "").trim();
        if (!name) { alert("請填寫品項名稱"); return; }

        const catSel = document.getElementById("mmCat");
        let category = catSel?.value || "";
        if (category === "__new__") {
          category = (document.getElementById("mmNewCat")?.value || "").trim();
          if (!category) { alert("請填寫新分類名稱"); return; }
        }

        const color = document.getElementById("mmColor")?.value || "#888888";
        const photo = (document.getElementById("mmPhoto")?.value || "").trim();
        const pType = document.querySelector(".mm-ptype:checked")?.value || "simple";

        const itemData = { name, category, color, available: true };
        if (photo) itemData.photo = photo;

        if (pType === "simple") {
          itemData.price = parseInt(document.getElementById("mmSimplePrice")?.value) || 0;
        } else if (pType === "variants") {
          const variants = Array.from(document.querySelectorAll("#mmVariants .mm-variant-row"))
            .map(row => ({
              label: row.querySelector(".v-label")?.value.trim() || "",
              price: parseInt(row.querySelector(".v-price")?.value) || 0,
            })).filter(v => v.label);
          if (!variants.length) { alert("請至少新增一個規格"); return; }
          itemData.variants = variants;
          itemData.price    = variants[0].price;
        } else if (pType === "steps") {
          const stepEls = document.querySelectorAll(".mm-step");
          const steps = Array.from(stepEls).map((stepEl, si) => ({
            label: stepEl.querySelector(`#mmStepLabel${si}`)?.value.trim() || "",
            options: Array.from(stepEl.querySelectorAll(".mm-step-opt")).map(optEl => ({
              label: optEl.querySelector(".so-label")?.value.trim() || "",
              price: optEl.querySelector(".so-price")?.value !== ""
                ? parseInt(optEl.querySelector(".so-price")?.value) : null,
            })).filter(o => o.label),
          })).filter(s => s.options.length > 0);
          if (!steps.length) { alert("請至少新增一個步驟選項"); return; }
          itemData.steps = steps;
          itemData.price = steps[0]?.options[0]?.price ?? 0;
        }

        const docId = id || ("item-" + Date.now());
        const existingIdx = menuAdminItems.findIndex(i => i.id === (id || docId));
        itemData.sortOrder = existingIdx >= 0
          ? (menuAdminItems[existingIdx].sortOrder ?? existingIdx)
          : menuAdminItems.length;
        itemData.id = id || docId;

        try {
          await menuCollection().doc(id || docId).set(itemData, { merge: true });
          if (existingIdx >= 0) {
            menuAdminItems[existingIdx] = { ...menuAdminItems[existingIdx], ...itemData };
          } else {
            menuAdminItems.push(itemData);
            menuAdminCat = category;
          }
          closeMenuModal();
          renderMenuAdmin();
          document.getElementById("menuAdminStatus").textContent = `已儲存「${name}」`;
        } catch (e) {
          alert("儲存失敗：" + e.message);
        }
      }

      function inferCategory(displayName) {
        const m = displayName.match(/（([^（）]+)）$/);
        const variant  = m ? m[1] : null;
        const baseName = variant ? displayName.slice(0, displayName.lastIndexOf("（")) : displayName;

        if (variant === "吐司" || variant === "漢堡" || variant === "丹麥" || variant === "年輪堡") {
          return baseName.includes("花生") ? "手工花生（含蛋）" : "初麵包（含蛋）";
        }
        if (variant === "貝果") return "手工花生（含蛋）";
        if (variant === "蛋餅" || variant === "抓餅" || variant === "墨西哥餅") return "初餅";
        if (variant === "中" || variant === "大" || /^[中大]・/.test(variant)) return "初好茶";
        if (variant === "厚片" || variant === "丹麥（甜）") {
          const sweetNames = ["煉乳", "草莓", "奶酥", "藍莓", "手工花生", "明太子"];
          return sweetNames.some(n => baseName === n || baseName.startsWith(n)) ? "初點甜" : "初點甜";
        }

        const hotdogBunNames = ["德式熱狗堡", "燻香熱狗堡"];
        if (hotdogBunNames.includes(baseName)) return "熱狗堡";

        const noodleNames = ["蘑菇炒麵", "黑胡椒炒麵", "宮保雞丁炒麵", "意大利肉醬炒麵", "青醬炒麵"];
        if (noodleNames.some(n => baseName === n || baseName.startsWith(n))) return "初炒麵";

        const sweetNames = ["煉乳", "草莓", "奶酥", "藍莓", "手工花生", "明太子"];
        if (sweetNames.some(n => baseName === n || baseName.startsWith(n))) return "初點甜";

        return "初點心";
      }

      async function loadStaffList() {

              ? "<span class=\"staff-disabled\">已停用</span>" : "啟用中";

              `<button class="staff-action-btn" onclick="changeStaffRole('${uid}','${d.role}')">改角色</button>`;

              (d.active === false
                ? `<button class="staff-action-btn" onclick="toggleStaffActive('${uid}',false)">啟用</button>`
                : `<button class="staff-action-btn danger" onclick="toggleStaffActive('${uid}',true)">停用</button>`);

      async function addStaffAccount() {
        const email       = document.getElementById("newStaffEmail").value.trim();
        const password    = document.getElementById("newStaffPassword").value;
        const displayName = document.getElementById("newStaffName").value.trim();
        const role        = document.getElementById("newStaffRole").value;
        const statusEl    = document.getElementById("addStaffStatus");
        const btn         = document.getElementById("addStaffBtn");

        if (!email || !password || !displayName) {
          statusEl.className = "settings-status err";
          statusEl.textContent = "請填寫所有欄位";
          return;
        }
        if (password.length < 6) {
          statusEl.className = "settings-status err";
          statusEl.textContent = "密碼至少 6 個字元";
          return;
        }

        btn.disabled = true;
        statusEl.className = "settings-status";
        statusEl.textContent = "建立中…";

        // 用第二個 App 實例建立帳號，不影響 owner 目前的 session
        const secondaryApp = firebase.initializeApp(firebaseConfig, "staff_create_" + Date.now());
        const secondaryAuth = secondaryApp.auth();

        try {
          const { user } = await secondaryAuth.createUserWithEmailAndPassword(email, password);
          const uid = user.uid;
          const storeId = getStoreId();
          const data = {
            storeId, role, displayName, email,
            active:    true,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          };
          const batch = db.batch();
          batch.set(db.collection("users").doc(uid), data);
          batch.set(storeDoc().collection("members").doc(uid), data);
          await batch.commit();

          document.getElementById("newStaffEmail").value    = "";
          document.getElementById("newStaffPassword").value = "";
          document.getElementById("newStaffName").value     = "";
          statusEl.className = "settings-status";
          statusEl.textContent = "✓ 帳號建立成功";
          loadStaffList();
        } catch (err) {
          statusEl.className = "settings-status err";
          const msgs = {
            "auth/email-already-in-use": "此 Email 已被使用",
            "auth/invalid-email":        "Email 格式錯誤",
            "auth/weak-password":        "密碼強度不足",
          };
          statusEl.textContent = msgs[err.code] || ("建立失敗：" + err.message);
        } finally {
          await secondaryApp.delete();
          btn.disabled = false;
        }
      }

      async function changeStaffRole(uid, currentRole) {
        const newRole = currentRole === "staff" ? "manager" : "staff";
        if (!confirm(`將角色從 ${currentRole} 改為 ${newRole}？`)) return;
        try {
          const batch = db.batch();
          batch.update(db.collection("users").doc(uid), { role: newRole });
          batch.update(storeDoc().collection("members").doc(uid), { role: newRole });
          await batch.commit();
          loadStaffList();
        } catch (err) {
          alert("更新角色失敗：" + err.message);
        }
      }

      async function toggleStaffActive(uid, currentlyActive) {
        const action = currentlyActive ? "停用" : "啟用";
        if (!confirm(`確定要${action}此帳號？`)) return;
        const newActive = !currentlyActive;
        try {
          const batch = db.batch();
          batch.update(db.collection("users").doc(uid), { active: newActive });
          batch.update(storeDoc().collection("members").doc(uid), { active: newActive });
          await batch.commit();
          loadStaffList();
        } catch (err) {
          alert(`${action}失敗：` + err.message);
        }
      }

      async function runHealthCheck() {
        const listEl    = document.getElementById("healthList");
        const summaryEl = document.getElementById("healthSummary");
        listEl.innerHTML    = "<p class=\"staff-empty\">檢查中…</p>";
        summaryEl.className = "health-summary";
        summaryEl.textContent = "檢查中…";

        const results = []; // { section, label, status, msg }

        // ── 店家設定 ──
        const S_STORE = "店家設定";
        let sd = null;
        try { const sn = await storeDoc().get(); sd = sn.exists ? sn.data() : null; } catch (_) {}
        results.push({ section: S_STORE, label: "店名",     status: sd?.storeName ? "pass" : "error", msg: sd?.storeName || "storeName 未設定" });
        results.push({ section: S_STORE, label: "電話",     status: sd?.phone     ? "pass" : "warn",  msg: sd?.phone     || "未設定" });
        results.push({ section: S_STORE, label: "營業時間", status: sd?.hours     ? "pass" : "warn",  msg: sd?.hours     || "未設定" });
        results.push({ section: S_STORE, label: "Logo",     status: sd?.logo      ? "pass" : "warn",
          msg:    sd?.logo ? "已設定" : "尚未設定 Logo，前台會使用預設 Logo",
          hint:   sd?.logo ? "" : "前往「店家設定」貼上 Logo 圖片網址",
          navTab: sd?.logo ? "" : "storeSettings" });
        const themeOk = sd?.theme?.primary && sd?.theme?.accent;
        results.push({ section: S_STORE, label: "主題色彩", status: themeOk ? "pass" : "warn",
          msg: themeOk ? (sd.theme.primary + " / " + sd.theme.accent) : "主題色彩未完整設定" });
        const isPaused = sd?.acceptingOrders === false;
        results.push({ section: S_STORE, label: "接單狀態",
          status: isPaused ? "warn" : "pass",
          msg:    isPaused ? ("暫停接單" + (sd.pauseMessage ? "：" + sd.pauseMessage : "")) : "接單中",
          hint:   isPaused ? "前往「收單」tab 恢復接單" : "",
          navTab: isPaused ? "live" : "" });

        // ── 菜單 ──
        const S_MENU = "菜單";
        let items = [];
        try { const sn = await menuCollection().get(); items = sn.docs.map(d => d.data()); } catch (_) {}
        results.push({ section: S_MENU, label: "有品項",       status: items.length > 0      ? "pass" : "error", msg: items.length > 0      ? ("共 " + items.length + " 項")                           : "菜單無品項" });
        const avail = items.filter(i => i.available !== false);
        results.push({ section: S_MENU, label: "有可供應品項", status: avail.length > 0      ? "pass" : "error", msg: avail.length > 0      ? (avail.length + " 項供應中")                             : "所有品項均已下架" });
        const catOk = items.length > 0 && items.every(i => i.category);
        results.push({ section: S_MENU, label: "分類完整",     status: catOk                 ? "pass" : "warn",  msg: catOk                 ? "所有品項都有分類"                                       : "有品項缺少 category" });
        const sortOk = items.length > 0 && items.every(i => i.sortOrder != null);
        results.push({ section: S_MENU, label: "排序已設定",   status: sortOk                ? "pass" : "warn",  msg: sortOk                ? "所有品項都有 sortOrder"                                  : "有品項缺少 sortOrder（執行「排序」功能可修正）" });

        // ── 帳號 ──
        const S_ACCT = "帳號";
        let members = [];
        try { const sn = await storeDoc().collection("members").get(); members = sn.docs.map(d => d.data()); } catch (_) {}
        results.push({ section: S_ACCT, label: "Owner 帳號",  status: "pass", msg: "目前登入帳號即為 owner" });
        const staffCount = members.filter(m => m.role === "staff" || m.role === "manager").length;
        results.push({ section: S_ACCT, label: "有工作人員",  status: staffCount > 0 ? "pass" : "warn",
          msg:    staffCount > 0 ? (staffCount + " 個 staff/manager") : "尚未建立員工帳號；若目前只有老闆操作可忽略",
          hint:   staffCount > 0 ? "" : "前往「員工帳號」新增 staff 或 manager",
          navTab: staffCount > 0 ? "" : "staffAccounts" });

        // ── QR Code / PWA ──
        const S_PWA = "QR Code / PWA";
        const baseUrl = (typeof APP_CONFIG !== "undefined" && APP_CONFIG.baseUrl) ? APP_CONFIG.baseUrl : "";
        results.push({ section: S_PWA, label: "baseUrl 設定", status: baseUrl ? "pass" : "error", msg: baseUrl || "APP_CONFIG.baseUrl 未設定" });
        const orderUrl = baseUrl ? (baseUrl.replace(/\/$/, "") + "/?store=" + getStoreId()) : "";
        results.push({ section: S_PWA, label: "點餐網址",
          status: orderUrl ? "pass" : "error", msg: orderUrl || "無法組成，baseUrl 未設定" });

        const fetchOk = async (url, label) => {
          try {
            const r = await fetch(url, { cache: "no-cache" });
            return { section: S_PWA, label, status: r.ok ? "pass" : "warn", msg: r.ok ? ("HTTP " + r.status) : ("HTTP " + r.status + "，請確認部署") };
          } catch (_) {
            return { section: S_PWA, label, status: "warn", msg: "無法 fetch（可能離線）" };
          }
        };
        const [mfResult, swResult] = await Promise.all([
          fetchOk("/manifest.webmanifest", "manifest.webmanifest"),
          fetchOk("/sw.js", "sw.js"),
        ]);
        results.push(mfResult, swResult);

        // ── Render ──
        const hasError = results.some(r => r.status === "error");
        const hasWarn  = results.some(r => r.status === "warn");
        summaryEl.className = "health-summary " + (hasError ? "has-error" : hasWarn ? "has-warn" : "all-pass");
        summaryEl.textContent = hasError ? "❌  有錯誤需要處理" : hasWarn ? "⚠️  有警告，建議確認" : "✅  所有項目通過";

        let prevSection = "";
        listEl.innerHTML = results.map(r => {
          let h = "";
          if (r.section !== prevSection) {
            prevSection = r.section;
            h += "<p class=\"health-section-title\">" + r.section + "</p>";
          }
          const icon       = r.status === "pass" ? "✅" : r.status === "warn" ? "⚠️" : "❌";
          const navAttr    = r.navTab ? " class=\"health-label health-nav\" onclick=\"healthNavTo('" + r.navTab + "')\"" : " class=\"health-label\"";
          const hintHtml   = r.hint   ? "<div class=\"health-hint\">" + r.hint + "</div>" : "";
          h += "<div class=\"health-item\"><span class=\"health-icon\">" + icon + "</span>" +
               "<div><div" + navAttr + ">" + r.label + "</div>" +
               "<div class=\"health-msg\">" + r.msg + "</div>" + hintHtml + "</div></div>";
          return h;
        }).join("");
      }

      function renderStockList() {

          inner.innerHTML = '<div style="font-size:0.82rem;color:#bbb;padding:6px 0;">菜單無品項</div>';

        const groups = new Map();
        stockItems.forEach(item => {
          if (!groups.has(item.category)) groups.set(item.category, []);
          groups.get(item.category).push(item);
        });
        inner.innerHTML = [...groups.entries()].map(([cat, items]) => `
          <p class="stock-cat-label">${cat}</p>
          ${items.map(item => {
            const avail = item.available !== false;
            return `<div class="stock-item-row">
              <span class="stock-item-name${avail ? "" : " soldout"}">${item.name}</span>
              <button class="stock-avail-btn ${avail ? "available" : "soldout"}"

                onclick="toggleItemAvail('${item.id}',${avail})">
                ${avail ? "供應中" : "售完"}

            </div>`;
          }).join("")}
        `).join("");
      }

      async function toggleItemAvail(itemId, currentlyAvailable) {
        const btn = document.getElementById("stock-btn-" + itemId);
        if (btn) btn.disabled = true;
        const newAvail = !currentlyAvailable;
        try {
          await menuCollection().doc(itemId).update({ available: newAvail });
          const idx = stockItems.findIndex(i => i.id === itemId);
          if (idx !== -1) stockItems[idx].available = newAvail;
          renderStockList();
          // renderStockList rebuilds innerHTML; restore expand state
          if (!stockExpanded) document.getElementById("stockListInner")?.classList.add("hidden");
        } catch (err) {
          alert("操作失敗：" + err.message);
          if (btn) btn.disabled = false;
        }
      }

      // ── Pause / Accept Orders ──
      async function loadPauseState() {
        try {
          const snap = await storeDoc().get();
          const d = snap.exists ? snap.data() : {};
          updatePauseUI(d.acceptingOrders !== false, d.pauseMessage || "");
        } catch (err) {
          console.error("loadPauseState:", err);
        }
      }

      function updatePauseUI(accepting, pauseMsg) {
        const panel    = document.getElementById("pausePanel");
        const dot      = document.getElementById("pauseStatusDot");
        const label    = document.getElementById("pauseStatusLabel");
        const btn      = document.getElementById("pauseToggleBtn");
        const msgRow   = document.getElementById("pauseMsgRow");
        const msgInput = document.getElementById("pauseMsgInput");

        panel.classList.remove("hidden");
        panel.classList.toggle("paused", !accepting);
        dot.className = "pause-dot " + (accepting ? "accepting" : "paused");
        label.textContent = accepting ? "接單中" : "暫停接單中";

        if (canManagePause) {
          btn.textContent = accepting ? "暫停接單" : "恢復接單";
          btn.classList.toggle("pausing", !accepting);
          btn.classList.remove("hidden");
          if (msgInput) msgInput.value = pauseMsg;
          msgRow.classList.toggle("hidden", accepting);
        }
      }

      async function toggleAcceptingOrders() {
        const btn = document.getElementById("pauseToggleBtn");
        btn.disabled = true;
        const currentState = !document.getElementById("pausePanel").classList.contains("paused");
        const newValue = !currentState;
        try {
          const msgInput = document.getElementById("pauseMsgInput");
          const updates  = { acceptingOrders: newValue };
          if (!newValue && msgInput) updates.pauseMessage = msgInput.value.trim();
          await storeDoc().update(updates);
          updatePauseUI(newValue, (msgInput?.value || "").trim());
        } catch (err) {
          alert("操作失敗：" + err.message);
        } finally {
          btn.disabled = false;
        }
      }

      async function savePauseMessage() {
        const msgInput = document.getElementById("pauseMsgInput");
        const saveBtn  = document.querySelector(".pause-save-btn");
        const msg      = (msgInput?.value || "").trim();
        if (saveBtn) saveBtn.disabled = true;
        try {
          await storeDoc().update({ pauseMessage: msg });
          if (saveBtn) {
            saveBtn.textContent = "✓";
            setTimeout(() => { saveBtn.textContent = "儲存訊息"; saveBtn.disabled = false; }, 1400);
          }
        } catch (err) {
          alert("儲存失敗：" + err.message);
          if (saveBtn) saveBtn.disabled = false;
        }
      }

      // ── QR Code Tab ──
      function orderUrlFor(storeId) {
        return APP_CONFIG.baseUrl.replace(/\/$/, "") + "/?store=" + storeId;
      }

      function renderQRCode() {
        const storeId  = getStoreId();
        const orderUrl = orderUrlFor(storeId);
        const name     = document.getElementById("adminBrandName").textContent || storeId;
        document.getElementById("qrTabName").textContent = name;
        document.getElementById("qrTabUrl").textContent  = orderUrl;
        document.getElementById("qrTabImg").src =
          "https://api.qrserver.com/v1/create-qr-code/?size=440x440&margin=0&data=" +
          encodeURIComponent(orderUrl);
      }

      function printOrder(id) {
        const o = liveOrdersMap.get(id) || historyOrdersMap.get(id);
        if (!o) return;

        function esc(s) {
          return String(s == null ? "" : s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        const storeName = esc(STORE_CONFIG.storeName || "");

        let timeStr = "--";
        if (o.createdAt) {
          try {
            timeStr = new Date(o.createdAt.toMillis()).toLocaleString("zh-TW", {
              month: "numeric", day: "numeric",
              hour: "2-digit", minute: "2-digit"
            });
          } catch (_) {}
        }

        const itemRows = (o.items || []).map(item =>
          `<tr>
            <td class="item-name">${esc(item.name)}</td>
            <td class="item-qty">×${item.quantity}</td>
            <td class="item-price">$${item.lineTotal}</td>
          </tr>`
        ).join("");

        const phoneRow = o.phone
          ? `<tr><td class="info-label">電話</td><td colspan="2">${esc(o.phone)}</td></tr>` : "";
        const scheduledRow = o.scheduledTime
          ? `<tr><td class="info-label">取餐</td><td colspan="2">${esc(o.scheduledTime)}</td></tr>` : "";
        const noteBlock = (o.note && o.note !== "無")
          ? `<div class="note-row">備註：${esc(o.note)}</div>` : "";

        const w = window.open("", "_blank");
        if (!w) return;

        w.document.write(
          "<!doctype html><html><head><meta charset=\"UTF-8\">" +
          "<title>" + storeName + " #" + esc(String(o.orderNumber || "")) + "</title>" +
          "<style>" +
          "@page{margin:0;size:80mm auto}" +
          "*{box-sizing:border-box;margin:0;padding:0}" +
          "body{font-family:'PingFang TC','Noto Sans TC','Heiti TC',sans-serif;" +
            "font-size:12px;max-width:300px;margin:0 auto;padding:12px;color:#111;line-height:1.5}" +
          "h1{font-size:14px;font-weight:700;text-align:center;margin-bottom:2px}" +
          ".order-num{text-align:center;font-size:12px;color:#555;margin-bottom:6px}" +
          "hr{border:none;border-top:1px dashed #bbb;margin:6px 0}" +
          "table{width:100%;border-collapse:collapse}" +
          "td{padding:1px 0;vertical-align:top}" +
          ".info-label{color:#666;width:48px}" +
          ".item-qty{width:32px;text-align:center}" +
          ".item-price{width:48px;text-align:right;font-weight:600}" +
          ".total-row td{padding-top:5px;font-weight:700;font-size:13px;border-top:1px solid #111}" +
          ".note-row{margin-top:6px;font-size:11px;color:#555}" +
          "@media print{body{padding:4px}}" +
          "</style></head><body>" +
          "<h1>" + storeName + "</h1>" +
          "<p class=\"order-num\">訂單 #" + esc(String(o.orderNumber || "")) + "</p>" +
          "<hr>" +
          "<table>" +
          "<tr><td class=\"info-label\">時間</td><td colspan=\"2\">" + esc(timeStr) + "</td></tr>" +
          "<tr><td class=\"info-label\">服務</td><td colspan=\"2\">" + esc(o.service || "") + " ・ " + esc(o.payment || "") + "</td></tr>" +
          "<tr><td class=\"info-label\">顧客</td><td colspan=\"2\">" + esc(formatCustomer(o)) + "</td></tr>" +
          phoneRow + scheduledRow +
          "</table>" +
          "<hr>" +
          "<table>" +
          itemRows +
          "<tr class=\"total-row\"><td colspan=\"2\">合計</td><td class=\"item-price\">$" + o.total + "</td></tr>" +
          "</table>" +
          noteBlock +
          "<script>window.onload=function(){window.print();}<\/script>" +
          "</body></html>"
        );
        w.document.close();
      }

      function printQRCode() {
        const storeId  = getStoreId();
        const orderUrl = orderUrlFor(storeId);
        const name     = document.getElementById("qrTabName").textContent;
        const qrSrc    = "https://api.qrserver.com/v1/create-qr-code/?size=480x480&margin=0&data=" +
                         encodeURIComponent(orderUrl);
        const w = window.open("", "_blank");
        w.document.write(
          "<!doctype html><html><head><meta charset=\"UTF-8\"><title>" + name + " QR Code</title>" +
          "<style>body{margin:0;padding:40px;font-family:sans-serif;text-align:center}" +
          "h1{font-size:1.4rem;margin-bottom:6px}p{color:#aaa;font-size:0.75rem;margin-bottom:20px}" +
          "img{width:280px;height:280px}@media print{body{padding:20px}}</style></head><body>" +
          "<h1>" + name + "</h1><p>" + orderUrl + "</p>" +
          "<img src=\"" + qrSrc + "\" />" +
          "<script>window.onload=function(){window.print();}<\/script>" +
          "</body></html>"
        );
        w.document.close();
      }
    </script>
    <script src="pwa.js"></script>
  </body>
</html>
