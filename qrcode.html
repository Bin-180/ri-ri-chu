<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>點餐 QR Code</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#1a2535">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BinOrder">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Klee One", "Noto Serif TC", "PingFang TC", sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      width: min(420px, 100%);
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e0e0e0;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #1a1a1a;
      margin: 18px auto;
      border-radius: 2px;
    }

    .scan-hint {
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    .qr-wrap {
      display: inline-block;
      padding: 12px;
      border: 2px solid #1a1a1a;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .qr-wrap img {
      display: block;
      width: 240px;
      height: 240px;
    }

    .url {
      font-size: 0.68rem;
      color: #bbb;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .info {
      font-size: 0.78rem;
      color: #666;
      line-height: 1.9;
      letter-spacing: 0.02em;
    }

    .hours-badge {
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 3px 12px;
      font-size: 0.78rem;
      color: #555;
      margin-top: 12px;
      letter-spacing: 0.04em;
    }

    @media print {
      body { background: #fff; padding: 0; min-height: auto; }
      .card { box-shadow: none; border-radius: 0; width: 100%; padding: 32px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img id="qrLogo" src="" class="logo" alt="" />
    <h1 id="qrName"></h1>
    <p class="subtitle" id="qrSubtitle"></p>

    <div class="divider"></div>

    <p class="scan-hint">掃描 QR Code 線上點餐</p>

    <div class="qr-wrap">
      <img id="qrCodeImg" src="" alt="點餐 QR Code" />
    </div>

    <p class="url" id="qrUrl"></p>

    <div class="info" id="qrInfo"></div>

    <div class="hours-badge" id="qrHours"></div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app-config.js"></script>
  <script src="store-config.js"></script>
  <script src="db-helpers.js"></script>
  <script>
    (async function () {
      const params  = new URLSearchParams(window.location.search);
      const storeId = params.get("store") || STORE_CONFIG.storeId;

      setActiveStoreId(storeId);

      // 點餐連結：baseUrl 來自 APP_CONFIG，換網域只需改 app-config.js
      const orderUrl = APP_CONFIG.baseUrl.replace(/\/$/, "") + "/?store=" + storeId;

      // 預設用 STORE_CONFIG，Firestore 載入成功則覆蓋
      let c = Object.assign({}, STORE_CONFIG, { storeId });
      try {
        const snap = await db.collection("stores").doc(storeId).get();
        if (snap.exists) {
          const d = snap.data();
          if (d.storeName) c.storeName = d.storeName;
          if (d.subtitle)  c.subtitle  = d.subtitle;
          if (d.address)   c.address   = d.address;
          if (d.phone)     c.phone     = d.phone;
          if (d.hours)     c.hours     = d.hours;
          if (d.closedDay) c.closedDay = d.closedDay;
          if (d.logo)      c.logo      = d.logo;
        }
      } catch (_) { /* fallback to STORE_CONFIG */ }

      document.title = c.storeName + " 點餐 QR Code";
      document.getElementById("qrLogo").src              = c.logo;
      document.getElementById("qrLogo").alt              = c.storeName;
      document.getElementById("qrName").textContent      = c.storeName;
      document.getElementById("qrSubtitle").textContent  = c.subtitle;
      document.getElementById("qrCodeImg").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=480x480&margin=0&data=" +
        encodeURIComponent(orderUrl);
      document.getElementById("qrUrl").textContent       = orderUrl;
      document.getElementById("qrInfo").innerHTML        = c.address + "<br />" + c.phone;
      document.getElementById("qrHours").textContent     = c.hours + "　｜　" + c.closedDay;
    })();
  </script>
  <script src="pwa.js"></script>
</body>
</html>
